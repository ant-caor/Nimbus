name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs that need more raise it locally.
permissions:
  contents: read

# Each module is validated in isolation, the way a real consumer pulls it. The
# repo's go.work is a local-dev convenience only and must not mask a module's
# own go.mod in CI.
env:
  GOWORK: "off"

jobs:
  gofmt:
    name: gofmt (repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
      # gofmt is module-agnostic; one walk of the whole repo covers every module.
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

  test:
    name: test + vet (race)
    strategy:
      fail-fast: false
      matrix:
        # Floor is Go 1.25 (set by rueidis), so there is one supported Go line
        # for now; the OS axis is the meaningful one. The module axis validates
        # each shipped module in isolation.
        os: [ubuntu-latest, macos-latest]
        module: [".", "metrics", "invalidation/gcppubsub"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: test (race + coverage)
        working-directory: ${{ matrix.module }}
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      # Lint every module independently: one broken leg must not cancel (and so
      # mask) the rest. A dependency bump that leaves a sibling module
      # un-tidied fails only that module's leg — keep the others reporting.
      fail-fast: false
      matrix:
        # Every module, including the package-main examples/demo, so a broken
        # build there is caught (golangci-lint type-checks the code). Keep this
        # list in sync with the modules on disk (see the Makefile's ALL_MODULES).
        dir:
          [
            ".",
            "metrics",
            "invalidation/gcppubsub",
            "examples/cloudrun",
            "examples/redisbus",
            "demo/local",
            "test/integration",
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest
          working-directory: ${{ matrix.dir }}

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The shipped library modules (what consumers pull). examples/demo are
        # package main and test/integration is test infra, both out of scope.
        module: [".", "metrics", "invalidation/gcppubsub"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: govulncheck
        working-directory: ${{ matrix.module }}
        env:
          # Pin the patched toolchain so the stdlib scan reflects fixes already
          # released (e.g. GO-2026-5039 in net/textproto, fixed in go1.25.11).
          # Fetched from go.dev directly, independent of the setup-go manifest.
          GOTOOLCHAIN: go1.25.11
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  coverage:
    name: coverage floor (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: enforce core coverage floor
        run: |
          # Gate the root package — the core cache/coherence logic (cache.go,
          # builder.go, loader.go, …). The repo-wide aggregate is misleading: it
          # dilutes with packages (redisstore, redispubsub) whose tests live in the
          # separate integration module and report 0% here. Root coverage is the
          # meaningful, environment-stable number (currently 70%).
          go test -count=1 -covermode=atomic -coverprofile=cov.out ./... | tee test.out
          pct=$(awk '$1=="ok" && $2=="github.com/ant-caor/nimbus" {
                  for (i=1;i<=NF;i++) if ($i ~ /%$/) { sub(/%/,"",$i); print $i }
                }' test.out)
          floor=60.0
          echo "core (root package) coverage: ${pct}% (floor ${floor}%)"
          if [ -z "$pct" ]; then echo "::error::could not parse root package coverage"; exit 1; fi
          awk -v t="$pct" -v f="$floor" 'BEGIN { exit (t+0 >= f+0) ? 0 : 1 }' || {
            echo "::error::core coverage ${pct}% is below the ${floor}% floor"
            exit 1
          }

  bench:
    name: benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: bench
        run: go test -run='^$' -bench=. -benchmem -benchtime=10x ./...

  integration:
    name: integration (Redis + Pub/Sub emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: test/integration/go.sum
      - name: integration tests
        working-directory: test/integration
        run: go test -count=1 -timeout=15m ./...

  changelog:
    name: changelog (Keep a Changelog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need the PR base commit to diff the changed files
      # Format gate (every event): the file must follow Keep a Changelog —
      # an [Unreleased] section, only the canonical category headings, and a
      # reference to the spec. Catches typo'd/removed sections regardless of PR.
      - name: Validate CHANGELOG.md format
        run: |
          f=CHANGELOG.md
          test -f "$f" || { echo "::error::CHANGELOG.md is missing"; exit 1; }
          grep -qE '^## \[Unreleased\]' "$f" \
            || { echo "::error::CHANGELOG.md must have a '## [Unreleased]' section"; exit 1; }
          grep -qi 'keepachangelog\.com' "$f" \
            || { echo "::error::CHANGELOG.md must reference Keep a Changelog"; exit 1; }
          bad=$(grep -E '^### ' "$f" | grep -vE '^### (Added|Changed|Deprecated|Removed|Fixed|Security)$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-standard changelog heading(s) — use Added/Changed/Deprecated/Removed/Fixed/Security:"
            echo "$bad"
            exit 1
          fi
          echo "CHANGELOG.md format OK (Keep a Changelog)."
      # Update gate (PRs only): a PR that changes Go source or a go.mod must add a
      # CHANGELOG.md entry. Internal-only changes (tests, CI, no-op refactors) opt
      # out with the 'skip-changelog' label, per the CONTRIBUTING convention.
      # Dependabot's routine dependency bumps are exempt by author — they are
      # changelog noise pre-1.0, and the dependabot-auto-tidy workflow already
      # touches their go.mod files; a maintainer may still add an entry by hand.
      - name: Require a changelog entry for code changes
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.user.login != 'dependabot[bot]'
          && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          code=$(printf '%s\n' "$changed" | grep -E '\.go$' | grep -vE '(^|/)[^/]*_test\.go$' || true)
          mods=$(printf '%s\n' "$changed" | grep -E '(^|/)go\.mod$' || true)
          touched=$(printf '%s\n' "$changed" | grep -E '^CHANGELOG\.md$' || true)
          if { [ -n "$code" ] || [ -n "$mods" ]; } && [ -z "$touched" ]; then
            echo "::error::This PR changes code but does not update CHANGELOG.md. Add an entry under '## [Unreleased]' (Keep a Changelog), or apply the 'skip-changelog' label for an internal-only change."
            echo "--- code / module files changed ---"
            printf '%s\n' $code $mods
            exit 1
          fi
          echo "Changelog requirement satisfied."

  # Single required check for branch protection: it fans in every job above, so
  # the ruleset on main requires only "ci-success" instead of 17 brittle matrix
  # context names. It fails if any needed job failed or was cancelled.
  ci-success:
    name: ci-success
    if: always()
    needs: [gofmt, test, lint, govulncheck, coverage, bench, integration, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::one or more required CI jobs did not succeed"
          exit 1
      - run: echo "All required CI jobs passed."

  # NOTE: a dependency-review job (actions/dependency-review-action) was omitted
  # because the GitHub Dependency Review API requires GitHub Advanced Security on
  # this repository. Supply-chain coverage is instead provided by govulncheck
  # (above), Dependabot (.github/dependabot.yml), and OpenSSF Scorecard. Re-add
  # the job once Advanced Security / the Dependency Review API is available.

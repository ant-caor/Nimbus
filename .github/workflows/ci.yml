name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs that need more raise it locally.
permissions:
  contents: read

jobs:
  test:
    name: test + vet + fmt (race)
    strategy:
      fail-fast: false
      matrix:
        # Floor is Go 1.25 (set by rueidis), so there is one supported Go line
        # for now; the OS matrix is the meaningful axis. Add windows / a newer
        # Go line here when relevant.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [".", "test/integration"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: ${{ matrix.dir }}

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      # Scan the library module (what ships to users); test-only deps live in a
      # separate module and are out of scope for what consumers pull in.
      - name: govulncheck
        env:
          # Pin the patched toolchain so the stdlib scan reflects fixes already
          # released (e.g. GO-2026-5039 in net/textproto, fixed in go1.25.11).
          # Fetched from go.dev directly, independent of the setup-go manifest.
          GOTOOLCHAIN: go1.25.11
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  bench:
    name: benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: bench
        run: go test -run='^$' -bench=. -benchmem -benchtime=10x ./...

  integration:
    name: integration (Redis + Pub/Sub emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: test/integration/go.sum
      - name: integration tests
        working-directory: test/integration
        run: go test -count=1 -timeout=15m ./...

  # NOTE: a dependency-review job (actions/dependency-review-action) was omitted
  # because the GitHub Dependency Review API requires GitHub Advanced Security on
  # this repository. Supply-chain coverage is instead provided by govulncheck
  # (above), Dependabot (.github/dependabot.yml), and OpenSSF Scorecard. Re-add
  # the job once Advanced Security / the Dependency Review API is available.

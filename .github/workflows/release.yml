name: Release

# Cutting a release is a deliberate, manual step: push a version tag and this
# workflow runs that module's test suite as a gate, then publishes a GitHub
# Release with auto-generated notes. The Go module version IS the tag; the module
# proxy (proxy.golang.org) and checksum DB (sum.golang.org) pick it up on first
# fetch — there is no artifact to build or sign for a library.
#
# This repo is multi-module, so a tag is prefixed with the module's directory:
#   v0.1.0                              -> root module github.com/ant-caor/nimbus
#   metrics/v0.1.0                      -> github.com/ant-caor/nimbus/metrics
#   invalidation/gcppubsub/v0.1.0       -> github.com/ant-caor/nimbus/invalidation/gcppubsub
# Release the root first, then the sub-modules (they require a published root
# version). See RELEASING.md.
on:
  push:
    tags:
      - "v*"
      - "metrics/v*"
      - "invalidation/gcppubsub/v*"

permissions:
  contents: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: Resolve module directory from tag
        id: mod
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            metrics/v*)                dir="metrics" ;;
            invalidation/gcppubsub/v*) dir="invalidation/gcppubsub" ;;
            v*)                        dir="." ;;
            *) echo "::error::unrecognized release tag '$tag'"; exit 1 ;;
          esac
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
      - name: Verify (race)
        working-directory: ${{ steps.mod.outputs.dir }}
        run: go test -race ./...
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag

name: Release

# Cutting a release is a deliberate, manual step: push a semver tag (e.g. v0.1.0)
# and this workflow runs the test suite as a gate, then publishes a GitHub
# Release with auto-generated notes. The Go module version IS the tag; the module
# proxy (proxy.golang.org) and checksum DB (sum.golang.org) pick it up on first
# fetch — there is no artifact to build or sign for a library.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: Verify (race)
        run: go test -race ./...
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag

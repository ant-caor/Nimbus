name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1" # weekly, Monday 07:20 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # A job-level permissions block REPLACES the workflow-level one, so every
    # scope Scorecard needs must be listed here. Its checks query commits, PRs,
    # reviews, workflow runs, and statuses via the GraphQL API; without these read
    # scopes those queries fail with "Resource not accessible by integration".
    permissions:
      contents: read # checkout / repo reads
      id-token: write # publish results to the OpenSSF API (for the badge)
      actions: read
      checks: read
      statuses: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      # Publishes the score to the OpenSSF API (drives the badge). The SARIF is
      # kept as an artifact rather than uploaded to GitHub code scanning, which
      # is not enabled on this repo; enable code scanning to surface it there.
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

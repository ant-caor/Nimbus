name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1" # weekly, Monday 07:20 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write # publish results to the OpenSSF API (for the badge)
    steps:
      # NOTE: no `persist-credentials: false` here — combined with checkout v6 it
      # made the clone fail ("repository not found"). Scorecard reads the repo via
      # the API, so persisting the checkout token is harmless.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      # Publishes the score to the OpenSSF API (drives the badge). The SARIF is
      # kept as an artifact rather than uploaded to GitHub code scanning, which
      # is not enabled on this repo; enable code scanning to surface it there.
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

name: CodeQL

# Static analysis for Go. Buildless extraction (build-mode: none) analyzes every
# .go file across all modules in the repo without needing a per-module build, so
# the multi-module layout does not limit coverage. Now feasible because the repo
# is public (code scanning is free for public repos).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to code scanning
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          build-mode: none
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:go"

name: Fuzz

# Active fuzzing, kept separate from the required CI gate so an exploratory find
# never blocks a merge. The seed corpora already run in `go test` (the required
# `test` job), giving regression protection; this workflow hunts for NEW inputs:
# a short burst on every PR, a long run nightly.
on:
  pull_request:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

env:
  GOWORK: "off"

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { dir: ".", target: "FuzzKeyString" }
          - { dir: "store", target: "FuzzValueCodecRoundTrip" }
          - { dir: "store", target: "FuzzValueCodecDecode" }
          - { dir: "invalidation", target: "FuzzEventRoundTrip" }
          - { dir: "invalidation", target: "FuzzEventDecode" }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: Pick fuzz duration
        id: dur
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "t=40s" >> "$GITHUB_OUTPUT"
          else
            echo "t=5m" >> "$GITHUB_OUTPUT"
          fi
      - name: fuzz
        working-directory: ${{ matrix.dir }}
        run: go test -run='^$' -fuzz='^${{ matrix.target }}$' -fuzztime=${{ steps.dur.outputs.t }} .
      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: ${{ matrix.dir }}/testdata/fuzz
          if-no-files-found: ignore
